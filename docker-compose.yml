services:
  # PostgreSQL
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-boo}
      POSTGRES_USER: ${DB_USERNAME:-boo}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-boo}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Laravel API (PHP-FPM)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api/.env:/var/www/.env
      - api_storage:/var/www/storage

  # Nginx for API
  api-nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./api/public:/var/www/public:ro
    ports:
      - "${API_PORT:-8080}:80"

  # Frontend (built static files served by nginx)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  pgdata:
  api_storage:
